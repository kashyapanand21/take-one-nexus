<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moderation - TAKE ONE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/pages/moderation.css">
  <link rel="stylesheet" href="/styles/components/global-chat-fab.css">
</head>
<body>
  <header>
    <a class="logo" href="/project">TAKE <span>ONE</span></a>
    <nav>
      <a href="/project">Home</a>
      <a href="/profile">Profile</a>
      <a href="/legal">Legal</a>
    </nav>
  </header>

  <main class="moderation-shell">
    <section class="moderation-head">
      <div class="kicker">Safety Dashboard</div>
      <h1>Moderation Tools</h1>
      <p>
        This page is for admin or moderator accounts only. Users can report unsafe content through the API,
        and moderators can review, resolve, or dismiss those reports here.
      </p>
    </section>

    <div class="toolbar">
      <select id="statusFilter">
        <option value="">All Reports</option>
        <option value="open">Open</option>
        <option value="reviewing">Reviewing</option>
        <option value="resolved">Resolved</option>
        <option value="dismissed">Dismissed</option>
      </select>
      <button type="button" id="refreshReportsBtn">Refresh</button>
    </div>

    <div class="report-list" id="reportList">
      <div class="empty">Loading moderation reports...</div>
    </div>
  </main>

  <script src="/scripts/api/api.js"></script>
  <script src="/scripts/utils/helpers.js"></script>
  <script src="/scripts/components/ui.js"></script>
  <script src="/scripts/animations/common.js"></script>
  <script src="/scripts/pages/moderation.js"></script>
  <script src="/scripts/components/global-chat-fab.js"></script>
</body>
</html>
